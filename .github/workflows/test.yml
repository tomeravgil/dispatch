name: C/C++ CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev cmake

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build

    - name: Build tests
      working-directory: ${{github.workspace}}/build
      run: make dispatch_test

    - name: Run tests
      working-directory: ${{github.workspace}}/build
      run: ./dispatch_test
